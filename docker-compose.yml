# Spins up the two infrastructure dependencies (PostgreSQL + Redis) for local
# development. The NestJS backend and the React frontend run on the host and
# connect to these via the mapped localhost ports (see backend/.env.example).
#
#   docker compose up -d
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: wenexus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventbooking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventbooking"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wenexus-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
